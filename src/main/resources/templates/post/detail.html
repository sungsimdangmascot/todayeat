<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <title>오늘뭐먹지 - 게시글 상세</title>
   <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

   <header th:replace="~{fragments/layout :: header}">
   </header>

   <div class="container" style="max-width: 800px;">

      <!-- 게시글 헤더 -->
      <div class="card">
         <div class="flex-between mb-8">
            <h2 style="font-size:1.4rem;" th:text="${post.postTitle}">제목</h2>
            <span class="stars" th:text="|★ ${post.postRating}|">★★★★★</span>
         </div>
         <div class="text-muted text-sm mb-16">
            📍 서울 을지로3가 &nbsp;|&nbsp; 작성자: <strong th:text="${post.memberName}">홍길동</strong>
            &nbsp;|&nbsp; <span th:text="${post.postCreatedAt}">2025.04.23</span>       
         </div>

         <!-- 대표 사진 -->
         <div class="img-placeholder" style="height: 320px; margin-bottom: 20px;">
            대표 사진
         </div>

         <!-- 본문 -->
         <p style="line-height: 1.8; color: #444;"
            th:text="${post.postContent}">
            내용
         </p>

         <hr class="divider">

         <!-- 지도 -->
         <div class="mb-8"><strong>📍 맛집 위치</strong></div>
         <div class="map-placeholder" style="height: 200px; margin-bottom: 20px;">
            <span class="map-icon">🗺</span>
            <span>카카오맵 — 서울 중구 을지로3가</span>
         </div>

         <!-- 좋아요 + 수정/삭제 -->
         <div class="flex-between">
            <button class="like-btn liked">♥ 좋아요 &nbsp;<strong>24</strong></button>
            <!-- 본인 게시글에만 수정, 삭제 버튼 표시 -->
            <th:block th:if="${session.loginMember != null and session.loginMember.memberId == post.memberId}">
            <div class="flex gap-8">
               <a th:href="@{post/update/{id}(id=${post.postId})}">
                  <button class="btn btn-outline btn-sm">수정</button>
               </ath>
               <form>
                  <button type="submit" class="btn btn-danger btn-sm">삭제</button>
               </form>
            </div>
            </th:block>
         </div>
      </div>

      <!-- 댓글 -->
      <div class="card">
         <h3 style="margin-bottom:16px;">댓글 <span style="color:#4a90d9;">3</span></h3>

         <div class="comment-item">
            <div class="comment-header">
               <div class="flex gap-8" style="align-items:center;">
                  <strong class="comment-author">김철수</strong>
                  <span class="comment-date">2025.04.23 14:32</span>
               </div>
               <button class="btn btn-danger btn-sm">삭제</button>
            </div>
            <div class="comment-body">저도 여기 가봤는데 진짜 맛있었어요! 재방문 의사 100%</div>
         </div>

         <div class="comment-item">
            <div class="comment-header">
               <div class="flex gap-8" style="align-items:center;">
                  <strong class="comment-author">이영희</strong>
                  <span class="comment-date">2025.04.23 16:10</span>
               </div>
            </div>
            <div class="comment-body">웨이팅 얼마나 기다렸나요? 주말에 가보려고요 🙂</div>
         </div>

         <div class="comment-item" style="border-bottom:none;">
            <div class="comment-header">
               <div class="flex gap-8" style="align-items:center;">
                  <strong class="comment-author">홍길동</strong>
                  <span class="comment-date">2025.04.23 17:05</span>
                  <span class="badge badge-primary">작성자</span>
               </div>
               <button class="btn btn-danger btn-sm">삭제</button>
            </div>
            <div class="comment-body">평일은 30분 정도, 주말은 1시간 이상 기다렸어요!</div>
         </div>

         <!-- 댓글 입력 -->
         <div style="margin-top:20px; padding-top:16px; border-top:1px solid #eee;">
            <div class="flex gap-8">
               <input class="form-control" type="text" placeholder="댓글을 입력하세요 (비동기 처리)">
               <button class="btn btn-primary" style="white-space:nowrap;">등록</button>
            </div>
         </div>
      </div>

      <a th:href="@{/}"><button class="btn btn-secondary">← 목록으로</button></a>

   </div>

   <footer th:replace="~{fragments/layout :: footer}"></footer>

</body>

</html>
