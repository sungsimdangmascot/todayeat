<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>오늘뭐먹지 - 게시글 상세</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<!-- 서버에서 보내준 데이터를 data-* 속성으로 저장(화면에 보이지 않음) 
	th:attr - Thymeleaf로 여러개의 속성을 한번에 동적으로 설정 -->
	<div id="page-data" style="display:none;"
		th:attr="data-post-id=${post.postId}, data-logged-in=${session.loginMember != null}">       
		
	</div>

	<header th:replace="~{fragments/layout :: header}">
	</header>

	<div class="container" style="max-width: 800px;">

		<!-- 게시글 헤더 -->
		<div class="card">
			<div class="flex-between mb-8">
				<h2 style="font-size:1.4rem;" th:text="${post.postTitle}">제목</h2>
				<span class="stars" th:text="|★ ${post.postRating}|">★★★★★</span>
			</div>
			<div class="text-muted text-sm mb-16">
				📍 서울 을지로3가 &nbsp;|&nbsp; 작성자: <strong th:text="${post.memberName}">홍길동</strong>
				&nbsp;|&nbsp; <span th:text="${post.postCreatedAt}">2025.04.23</span>       
			</div>

			<!-- 대표 사진 -->
			
			<!--사진이 있을 때-->
			<img th:if="${post.postImg != null}"
				th:src="@{/upload/{img}(img=${post.postImg})}"
				style="width:100%; height:320px; object-fit:cover; border-radius:8px; margin-bottom:20px;"
				alt="게시글 사진">
			
			<!--이미지가 없을 때-->
			<div th:unless="${post.postImg != null}" 
			class="img-placeholder" 
			style="height: 320px; margin-bottom: 20px;">
				대표 사진 없음
			</div>

			<!-- 본문 -->
			<p style="line-height: 1.8; color: #444;"
			   th:text="${post.postContent}">
				내용
			</p>

			<hr class="divider">

			<!-- 지도 -->
			<div class="mb-8"><strong>📍 맛집 위치</strong></div>
			<div class="map-placeholder" style="height: 200px; margin-bottom: 20px;">
				<span class="map-icon">🗺</span>
				<span>카카오맵 — 서울 중구 을지로3가</span>
			</div>

			<!-- 좋아요 + 수정/삭제 -->
			<div class="flex-between">
				<button th:class="${liked}? 'like-btn liked' : 'like-btn'"
						id="like-btn"
						onclick="toggleLike()">
					♥ 좋아요 &nbsp;<strong id="like-count" th:text="${likeCount}">0</strong>
				</button>
				<!-- 본인 게시글에만 수정, 삭제 버튼 표시 -->
				<th:block th:if="${session.loginMember != null and session.loginMember.memberId == post.memberId}">
				<div class="flex gap-8">
					<a th:href="@{/post/update/{id}(id=${post.postId})}">
						<button class="btn btn-outline btn-sm">수정</button>
					</a>
					<form th:action="@{/post/delete/{id}(id=${post.postId})}"
						method="post"
						onsubmit="return confirm('게시글을 삭제하시겠습니까?')">
						<button type="submit" class="btn btn-danger btn-sm">삭제</button>
					</form>
				</div>
				</th:block>
			</div>
		</div>

		<!-- 댓글 -->
		<div class="card">
			<h3 style="margin-bottom:16px;">댓글 <span id="comment-count" style="color:#4a90d9;">0</span></h3>

			<!-- 댓글 목록 컨테이너 : js가 이 안에 댓글 카드를 동적으로 작성 -->
			<div id="comment-list"></div>
<!--			<div class="comment-item">
				<div class="comment-header">
					<div class="flex gap-8" style="align-items:center;">
						<strong class="comment-author">김철수</strong>
						<span class="comment-date">2025.04.23 14:32</span>
					</div>
					<button class="btn btn-danger btn-sm">삭제</button>
				</div>
				<div class="comment-body">저도 여기 가봤는데 진짜 맛있었어요! 재방문 의사 100%</div>
			</div>-->

			<!-- 댓글 입력 -->
			<div style="margin-top:20px; padding-top:16px; border-top:1px solid #eee;">
				<div class="flex gap-8">
					<input id="comment-input" class="form-control" type="text" placeholder="댓글을 입력하세요">
					<button type="button" class="btn btn-primary" 
					style="white-space:nowrap;"
					onclick="writeComment()">등록</button>
				</div>
			</div>
		</div>

		<a th:href="@{/}"><button class="btn btn-secondary">← 목록으로</button></a>

	</div>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
	
	<!-- js 불러오기 -->
	<script src="/js/page-data.js"></script>
	<script src="/js/like.js"></script>
	<script src="/js/comment.js"></script>

</body>

</html>
