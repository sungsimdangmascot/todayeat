	<div id="page-data" style="display:none;"

			</div>
			<div class="text-muted text-sm mb-16">

			<!-- 대표 사진 -->

				 alt="게시글 사진">
			
			<!-- 사진이 없을 때 -->
			<div th:unless="${post.postImg != null}" 
			class="img-placeholder" 
			style="height: 320px; margin-bottom: 20px;">
				대표 사진 없음
			</div>

			<!-- 본문 -->
			<p style="line-height: 1.8; color: #444;"
			   th:text="${post.postContent}">
				내용
			</p>

			<hr class="divider">

			<!-- 지도 -->
			<div class="mb-8">
				<strong>📍 맛집 위치</strong>

			</div>
			<!-- 지도 표시 -->
			<div id="map-detail" 
				style="width:100%; height:280px; 
				border-radius:8px; margin-bottom:20px;">
			</div>
			

			<!-- 좋아요 + 수정/삭제 -->
			<div class="flex-between">
				<button th:class="${liked}? 'like-btn liked' : 'like-btn'"
						id="like-btn"
						onclick="toggleLike()">
					♥ 좋아요 &nbsp;<strong id="like-count" th:text="${likeCount}">0</strong>
				</button>
				<!-- 본인 게시글에만 수정, 삭제 버튼 표시 -->
				<th:block th:if="${session.loginMember != null and session.loginMember.memberId == post.memberId}">

						<button type="submit" class="btn btn-danger btn-sm">삭제</button>

			</div>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
	
	<!-- js 불러오기 -->
	<script src="/js/page-data.js"></script>

	<script>
		// page-data div에서 서버가 심어둔 좌표 값 읽어오기
		var pageData = document.getElementById("page-data");

		var lng = parseFloat(pageData.dataset.lng); // 경도
		
		// console.log("위도 : " + lat);
		// console.log("경도 : " + lng);
		
		// 지도 초기화 - map-detail div에 카카오 지도 그리기
		var container = document.getElementById('map-detail');
		var options = {
			center : new kakao.maps.LatLng(lat, lng), // 지도 중심 => 맛집 위치
			level : 4
		};
		var map = new kakao.maps.Map(container, options);
		
		// 마커표시 - 맛집 위치 핀 꽂기
		var marker = new kakao.maps.Marker({
			position : new kakao.maps.LatLng(lat, lng),
