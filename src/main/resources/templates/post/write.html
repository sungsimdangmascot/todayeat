<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <title>오늘뭐먹지 - 게시글 작성</title>
   <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

   <header th:replace="~{fragments/layout :: header}">
   </header>

   <div class="container" style="max-width: 760px;">
      <div class="page-title">✏️ 맛집 후기 작성</div>

      <form class="card" th:action="@{/post/write}" method="post">

         <div class="form-group">
            <label>제목 *</label>
            <input name="postTitle"class="form-control" type="text" placeholder="제목을 입력하세요">
         </div>

         <div class="form-group">
            <label>별점 *</label>
            <div class="rating-input">
               <span class="active">★</span>
               <span class="active">★</span>
               <span class="active">★</span>
               <span class="active">★</span>
               <span>★</span>
            </div>
            <!-- 별점값 js에서 클릭시 value를 업데이트 -->
            <input type="hidden" name="postRating" value="4">
            <div class="text-muted text-sm mt-8">별을 클릭해서 별점을 선택하세요 (1~5점)</div>
         </div>

         <div class="form-group">
            <label>📍 맛집 위치 *</label>
            <div class="flex gap-8 mb-8">
               <input class="form-control" type="text" placeholder="장소명으로 검색하세요" style="flex:1;">
               <button class="btn btn-outline">지도에서 검색</button>
            </div>
            <div class="map-placeholder" style="height: 200px;">
               <span class="map-icon">🗺</span>
               <span>위치를 검색하면 지도에 표시됩니다</span>
               <span style="font-size:0.8rem; color:#aaa;">(카카오맵 API)</span>
            </div>
         </div>

         <div class="form-group">
            <label>사진 업로드</label>
            <!-- 파일 선택 버튼을 눌러 사진을 올린다 (브라우저 기본 업로드 버튼) -->
            <input type="file" id="imgInput" accept="image/*" style="font-size:0.85rem;">
            <div class="text-muted text-sm mt-8">JPG, PNG 파일 · 최대 10MB</div>
            <!-- 선택한 사진 미리보기 — 파일을 고르기 전에는 숨겨둔다 -->
            <img id="imgPreview" alt="미리보기"
               style="display:none; max-width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:10px;">
         </div>

         <div class="form-group">
            <label>후기 내용 *</label>
            <textarea name="postContent" class="form-control" rows="6"
               placeholder="맛집에 대한 솔직한 후기를 작성해주세요 (맛, 가격, 분위기, 재방문 의사 등)"></textarea>
         </div>

         <div class="flex-between" style="margin-top:8px;">
            <a th:href="@{/}"><button class="btn btn-secondary">취소</button></a>
            <button type="submit" class="btn btn-primary" style="padding: 10px 32px;">등록하기</button>
         </div>

      </form>
   </div>

   <footer th:replace="~{fragments/layout :: footer}"></footer>

   
   <script>
      // ===== 별점 클릭 처리 ===============
      let stars  = document.querySelectorAll(".rating-input span");
      let ratingInput = document.querySelector("input[name='postRating']");
      
      // console.log(stars);
      // console.log(ratingInput);
      
      // 별 표시 업데이트 - rating 개수만큼 active(노란색), 나머지는 비활성화
      function updateStars(rating){
         stars.forEach(function(s, i){
            if(i < rating){
               s.classList.add("active");
            } else{
               s.classList.remove("active");
            }
         });
      }
      
      stars.forEach(function(star, index){
         // 클릭 이벤트 - 별점 확정 + hidden필드 값 변경
         star.addEventListener("click", function(){
            ratingInput.value = index + 1;
            updateStars(index + 1);
            console.log(ratingInput);
         });
         
         // 마우스 올릴때 - 미리보기(해당 별까지 노란색으로 표시)
         star.addEventListener("mouseover", function(){
            updateStars(index + 1);
         });
         
         // 마우스 나갈때 - 현재 확정된 별점으로 유지
          star.addEventListener("mouseout", function(){
            updateStars(parseInt(ratingInput.value));
         });
      });
      
   
   
      // ===== 사진 업로드 미리보기 ===== 
      // [1] 파일 선택칸과 미리보기 이미지를 가져온다
      const imgInput = document.getElementById('imgInput');    // <input type="file">
      const imgPreview = document.getElementById('imgPreview');  // 미리보기 <img>

      // [2] 파일을 선택하면(change) 그 사진을 화면에 미리 보여준다
      imgInput.addEventListener('change', function () {
         const file = imgInput.files[0];               // 선택한 파일 (없으면 undefined)
         if (!file) return;

         const reader = new FileReader();              // 파일을 화면에 쓸 수 있는 형태로 읽는 도구
         reader.onload = function (e) {
            imgPreview.src = e.target.result;         // 읽어들인 이미지를 미리보기에 넣음
            imgPreview.style.display = 'block';       // 숨겨둔 미리보기를 보이게 함
         };
         reader.readAsDataURL(file);                   // 파일 읽기 시작
      });
   </script>

</body>

</html>
