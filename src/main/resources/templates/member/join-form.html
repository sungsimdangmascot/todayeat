<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오늘뭐먹지 - 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

	<header th:replace ="~{fragments/layout :: header}">  
	</header>

<div class="container-sm">
    <div class="page-title text-center">회원가입</div>

    <form th:action="@{/member/join}" method="post" class="card">
        <div class="form-group">
            <label>아이디 *</label>
            <input name="memberLoginId" class = "form-control" type="text" placeholder="영문·숫자 조합 4~20자">
            <div class="text-muted text-sm mt-8">✓ 사용 가능한 아이디입니다</div>
        </div>

        <div class="form-group">
            <label>비밀번호 *</label>
            <input name="memberPwd" class="form-control" type="password" placeholder="영문·숫자·특수문자 포함 8자 이상">
        </div>

        <div class="form-group">
            <label>비밀번호 확인 *</label>
            <input name="memberPwdCheck" class="form-control" type="password" placeholder="비밀번호를 한 번 더 입력하세요">
        </div>

        <div class="form-group">
            <label>이름 *</label>
            <input name="memberName" class="form-control" type="text" placeholder="2~10자, 한글·영문·숫자 사용 가능">
        </div>

        <div class="form-group">
            <label>이메일 *</label>
            <input name="memberEmail" class="form-control" type="email" placeholder="example@email.com">
        </div>

      <div th:if="${errorMsg != null}" th:text="${errorMsg}"
      style="color:#e74c3c; font-size:0.85rem; margin-top:8px; margin-bottom:8px;">
         
      </div>
        
        <button type="submit" class="btn btn-primary btn-block mt-8">가입하기</button>

        <div class="text-center mt-16 text-sm text-muted">
            이미 계정이 있으신가요?
            <a href="05_login.html" style="color:#4a90d9; text-decoration:none; font-weight:bold;"> 로그인</a>
        </div>
    </form>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
