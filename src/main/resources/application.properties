spring.application.name=todayeat

# 서버 포트 번호 설정
server.port=8810

#-------------------------------------
# 1. mysql DB연결
#-------------------------------------

# DB서버 주소(내 PC = localhost, 포트 3306, DB명 = springdb)
# useSSL=false          : SSL 보안 연결 사용 안 함 (로컬 개발 환경)
# serverTimezone        : 서버 시간대를 한국(Asia/Seoul)으로 지정
# characterEncoding     : 한글이 깨지지 않도록 UTF-8 인코딩 지정
spring.datasource.url=jdbc:mysql://localhost:3306/todayeat?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# DB 접속 아이디
spring.datasource.username=root

# DB 접속 비밀번호
spring.datasource.password=1234

# MySQL JDBC 드라이버 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 2. MyBatis 설정
#-------------------------------------------------------------------------

# Mapper xml 파일 위치 : resources/mappers/ 폴더 안의 모든 xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB 컬럼명 (member_id
mybatis.configuration.map-underscore-to-camel-case=true


# 세션 ID를 URL 에 붙이지 않고 쿠키로만 전달
# 이 설정이 없으면 로그인·회원가입 후 URL 뒤에 ;jsessionid=... 가 붙어서 이동됨
server.servlet.session.tracking-modes=cookie


# 파일 업로드 경로 설정
# 실제 파일이 저장될 서버 폴더 경로

todayeat.upload.path=C:/upload/todayeat/



#---------------------------------------------
# 파일 한 개의 최대의 크기
spring.servlet.multipart.max-file-size = 10MB

# 요청 최대 크기

spring.servlet.multipart.max-request-size = 10MB

# 카카오 맵 API 설정

# 카카오 개발자에서 발급한 js 키
# 브라우저에서 카카오 맵 SDK를 로드할 때 신원 확인에 사용됨
kakao.map.key = 13e020b4018169779a2ef3e029f21431

